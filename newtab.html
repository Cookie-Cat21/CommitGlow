<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CommitGlow Dashboard</title>
    <link rel="stylesheet" href="lib/github-calendar-responsive.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body id="bg-body">
    <!-- Brave-Style Stats -->
    <div class="stats-header">
        <div class="stat-item">
            <span class="stat-value" id="stat-trackers">14,281</span>
            <span class="stat-label">Trackers Blocked</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="stat-bandwidth">1.4 GB</span>
            <span class="stat-label">Bandwidth Saved</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="stat-time">12 min</span>
            <span class="stat-label">Time Saved</span>
        </div>
    </div>

    <!-- Central Clock & Search -->
    <div class="center-content">
        <div id="clock">00:00</div>
        <div id="date">JANUARY 1, 2026</div>
        
        <form action="https://search.brave.com/search" method="GET" class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" name="q" placeholder="Search Brave..." autocomplete="off">
        </form>
    </div>

    <!-- The Glow Widget -->
    <div id="commit-glow-widget"></div>

    <script src="lib/github-calendar.min.js"></script>
    <script src="newtab.js"></script>
</body>
</html>
